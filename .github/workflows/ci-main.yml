name: CI/CD Pipeline - Main Branch

on:
  push:
    branches:
      - 'main' # Executa apenas quando código entra na main

jobs:
  # JOB 1: Testes (Garante a qualidade)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Instalar dependências
        run: npm install
      - name: Inicializar DB
        run: node database/init-db.js
      - name: Executar Testes
        run: npm test

  # JOB 2: Construção da Imagem (Requisito do Professor)
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Construir imagem Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/api-musicas:latest .

      - name: Salvar imagem como artefato
        # Salva a imagem em um arquivo .tar para passar para o próximo job
        run: docker save -o api-musicas.tar ${{ secrets.DOCKER_USERNAME }}/api-musicas:latest

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: api-musicas.tar

  # JOB 3: Publicação da Imagem (Requisito do Professor)
  push:
    needs: build # Só roda se o job 'build' passar
    runs-on: ubuntu-latest
    steps:
      - name: Download do artefato
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      
      - name: Carregar imagem no Docker
        run: docker load -i api-musicas.tar
      
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Push para o Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/api-musicas:latest
