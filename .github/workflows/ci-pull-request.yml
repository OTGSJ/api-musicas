name: CI para Pull Requests

# Este workflow é acionado em pull requests que têm como alvo a branch 'main'
on:
  pull_request:
    branches:
      - "main"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Instalar dependências
        run: npm install

      - name: Inicializar banco de dados
        run: node database/init-db.js

      - name: Rodar testes
        run: npm test
